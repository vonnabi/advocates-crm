services:
  - type: web
    name: advocates-crm
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: ./scripts/render-build.sh
    startCommand: ./scripts/render-start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: advocates-crm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "true"
      # Secured demo: anonymous /api/ requests are rejected (no anonymous-as-admin).
      # The customer signs in; CORS allow-list auto-binds to the Render host (settings.py).
      - key: CRM_REQUIRE_AUTH
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: WEB_CONCURRENCY
        value: "2"
      # ONLYOFFICE Docs Cloud / Document Server.
      # Render also provides RENDER_EXTERNAL_URL automatically; CRM uses it as the public
      # URL for ONLYOFFICE callbacks unless CRM_PUBLIC_URL is set to a custom domain.
      - key: CRM_PUBLIC_URL
        sync: false
      - key: ONLYOFFICE_DOCUMENT_SERVER_URL
        sync: false
      - key: ONLYOFFICE_JWT_SECRET
        sync: false

databases:
  - name: advocates-crm-db
    region: frankfurt
    plan: free
    databaseName: advocates_crm
    user: advocates_crm_user

services:
  - type: web
    name: advocates-crm
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: ./scripts/render-build.sh
    preDeployCommand: cd backend && python manage.py migrate
    initialDeployHook: cd backend && python manage.py seed_demo
    startCommand: cd backend && python -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: advocates-crm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: advocates-crm-db
    region: frankfurt
    plan: free
    databaseName: advocates_crm
    user: advocates_crm_user
